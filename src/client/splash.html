<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="splash.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, height=device-height, user-scalable=0" />
    <title>The Last Pixel</title>
  </head>
  <body class="app">
    <div class="content">
      <canvas id="preview-canvas" width="160" height="160"></canvas>
      <h1 class="title">The Last Pixel</h1>
      <p class="subtitle">A hidden pixel art image is waiting to be uncovered.<br/>One reveal per player, per day.</p>
      <p class="username" id="title"></p>
      <button class="start-button" id="start-button">reveal a pixel →</button>
      <p class="hint">tap any covered cell to uncover part of today's art</p>
    </div>
    <script type="module" src="splash.ts" defer></script>
  </body>
</html>
